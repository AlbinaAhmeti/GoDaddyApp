<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoDaddy Forwarding App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f6f6f6;
    }

    h1 {
      margin-bottom: 15px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }

    button {
      padding: 12px 22px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      color: white;
    }

    #startBtn {
      background: black;
    }

    #stopBtn {
      background: #c62828;
    }

    #log {
      background: #111;
      color: #00ff66;
      padding: 15px;
      height: 540px;
      overflow-y: auto;
      white-space: pre-wrap;
      border-radius: 8px;
      font-family: Consolas, monospace;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h1>GoDaddy Forwarding Bot</h1>

  <div class="buttons">
    <button id="startBtn">Start</button>
    <button id="stopBtn">Stop</button>
  </div>

  <div id="log"></div>

  <script src="renderer.js"></script>
</body>
</html>
